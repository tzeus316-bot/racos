<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBERSORGUPANELİ | SORGÜ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0000;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        /* KANLI ARKAPLAN - ANİMASYONLU */
        .blood-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #1a0303 0%, #000000 100%);
            z-index: -2;
        }
        
        .blood-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(180,0,0,0.3) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(120,0,0,0.2) 0%, transparent 45%),
                        repeating-linear-gradient(45deg, rgba(139,0,0,0.1) 0px, rgba(139,0,0,0.1) 2px, transparent 2px, transparent 4px);
            animation: bloodWave 12s ease-in-out infinite, bloodPulse 4s ease-in-out infinite;
            z-index: -1;
        }
        
        @keyframes bloodWave {
            0%,100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.08); }
        }
        
        @keyframes bloodPulse {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        /* CAM EFEKT - GELİŞMİŞ */
        .glass-panel {
            background: rgba(20, 8, 8, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(139, 0, 0, 0.5);
            box-shadow: 0 8px 32px rgba(139, 0, 0, 0.3);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: glassAppear 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,77,77,0.1), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }
        
        .glass-panel:hover::before {
            left: 100%;
        }
        
        .glass-panel:hover {
            border-color: #ff4d4d;
            box-shadow: 0 8px 40px rgba(255, 77, 77, 0.4);
            transform: translateY(-2px);
        }
        
        @keyframes glassAppear {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        /* BAŞLIK ANİMASYONU */
        .cyber-title {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4d4d, #8b0000, #ff4d4d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px #ff0000);
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: titleGradient 3s ease infinite, titleGlow 2s ease-in-out infinite;
        }
        
        @keyframes titleGradient {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        @keyframes titleGlow {
            0%,100% { filter: drop-shadow(0 0 20px #ff0000); }
            50% { filter: drop-shadow(0 0 40px #ff4d4d); }
        }
        
        /* INPUT ANİMASYONLARI */
        .input-blood {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #8b0000;
            border-radius: 14px;
            padding: 16px;
            color: white;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: inputAppear 0.4s ease-out;
            transform-origin: left;
        }
        
        @keyframes inputAppear {
            from {
                opacity: 0;
                transform: scaleX(0.8);
            }
            to {
                opacity: 1;
                transform: scaleX(1);
            }
        }
        
        .input-blood:focus {
            outline: none;
            border-color: #ff4d4d;
            box-shadow: 0 0 30px #ff0000;
            transform: scale(1.02) translateY(-2px);
            background: rgba(0, 0, 0, 0.7);
        }
        
        .input-blood:hover {
            border-color: #ff4d4d;
            transform: translateY(-1px);
        }
        
        /* BUTON ANİMASYONLARI */
        .btn-primary {
            background: linear-gradient(135deg, #8b0000, #4a0000);
            border: 1px solid #ff4d4d;
            border-radius: 14px;
            padding: 16px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: buttonAppear 0.5s ease-out;
        }
        
        @keyframes buttonAppear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-primary:active::after {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px #ff0000;
            background: linear-gradient(135deg, #a00000, #5a0000);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #8b0000;
            border-radius: 10px;
            padding: 8px 14px;
            color: #ff9999;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: buttonAppear 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        .btn-secondary:hover {
            background: rgba(139, 0, 0, 0.2);
            border-color: #ff4d4d;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3);
        }
        
        .btn-secondary:active {
            transform: translateY(0);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #8b0000, #4a0000);
            border: 1px solid #ff4d4d;
            border-radius: 14px;
            padding: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: buttonAppear 0.5s ease-out;
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #a00000, #6b0000);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px #ff0000;
        }
        
        /* MENÜ ÖĞELERİ */
        .menu-item {
            background: rgba(139, 0, 0, 0.1);
            border: 1px solid #8b0000;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            color: #ffb3b3;
            width: 100%;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: menuItemAppear 0.4s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        @keyframes menuItemAppear {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .menu-item:hover {
            background: rgba(139, 0, 0, 0.3);
            border-color: #ff4d4d;
            transform: translateX(5px) translateY(-2px);
            box-shadow: -5px 5px 20px rgba(255, 77, 77, 0.3);
            color: white;
        }
        
        .menu-item::before {
            content: '▶';
            position: absolute;
            left: -20px;
            color: #ff4d4d;
            transition: left 0.3s ease;
        }
        
        .menu-item:hover::before {
            left: 5px;
        }
        
        /* SONUÇ KARTLARI */
        .result-card {
            background: linear-gradient(145deg, #1e1212, #140a0a);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid #8b0000;
            animation: resultCardAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transition: all 0.3s ease;
        }
        
        @keyframes resultCardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .result-card:hover {
            border-color: #ff4d4d;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.2);
        }
        
        /* DATA İTEM */
        .data-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ff4d4d;
            animation: dataItemAppear 0.4s ease-out;
            transition: all 0.3s ease;
        }
        
        @keyframes dataItemAppear {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .data-item:hover {
            background: rgba(139, 0, 0, 0.2);
            transform: translateX(5px);
            border-left-width: 5px;
        }
        
        /* LOADER - GELİŞMİŞ */
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139, 0, 0, 0.2);
            border-top: 4px solid #ff0000;
            border-right: 4px solid #ff0000;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite, pulse 2s ease-in-out infinite;
            margin: 30px auto;
            position: relative;
        }
        
        .loader::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 4px solid transparent;
            border-top: 4px solid #ff4d4d;
            border-right: 4px solid #ff4d4d;
            border-radius: 50%;
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite reverse;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        /* TELEGRAM POPUP */
        .telegram-popup {
            animation: slideDown 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55), pulse 2s ease-in-out infinite;
            border-bottom: 3px solid #ff0000;
            background: rgba(20, 8, 8, 0.95);
            backdrop-filter: blur(10px);
        }
        
        @keyframes slideDown {
            from { 
                transform: translateY(-100%) scale(0.9);
                opacity: 0;
            }
            to { 
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        
        /* STATS CARD */
        .stats-card {
            background: rgba(139, 0, 0, 0.1);
            border: 1px solid #8b0000;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            animation: statsCardAppear 0.5s ease-out;
        }
        
        @keyframes statsCardAppear {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .stats-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #ff4d4d;
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.3);
        }
        
        .stats-card i {
            transition: all 0.3s ease;
        }
        
        .stats-card:hover i {
            transform: scale(1.2) rotate(360deg);
            color: #ff4d4d;
        }
        
        /* ANNOUNCEMENT */
        .announcement {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #ffd700;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            animation: announcementSlide 0.5s ease-out;
            transition: all 0.3s ease;
        }
        
        @keyframes announcementSlide {
            from {
                opacity: 0;
                transform: translateX(-100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .announcement:hover {
            background: rgba(255, 215, 0, 0.2);
            transform: scale(1.02) translateX(5px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
        }
        
        /* SİDEBAR */
        #sidebar {
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        /* SAYFA GEÇİŞLERİ */
        .fade-enter {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        /* SCROLLBAR - ÖZEL */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0a0a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #8b0000;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff4d4d;
        }
        
        /* GİRİŞ MODAL */
        #auth-modal {
            animation: modalBackdrop 0.3s ease-out;
        }
        
        @keyframes modalBackdrop {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #auth-modal .glass-panel {
            animation: modalAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.7) translateY(-50px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        /* NAVBAR */
        nav {
            animation: navbarSlide 0.5s ease-out;
        }
        
        @keyframes navbarSlide {
            from {
                opacity: 0;
                transform: translateY(-100%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* BUTON TIKLAMA EFEKTİ */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform 0.5s, opacity 0.8s;
        }
        
        .ripple:active:after {
            transform: scale(0, 0);
            opacity: 0.3;
            transition: 0s;
        }
        
        /* YÜKLENİYOR YAZISI */
        .loading-text {
            animation: loadingDots 1.5s ease-in-out infinite;
        }
        
        @keyframes loadingDots {
            0%,20% { content: '.'; }
            40%,60% { content: '..'; }
            80%,100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="blood-bg"></div>
    <div class="blood-overlay"></div>

    <div id="debugPanel" class="debug-panel"></div>

    <div id="telegramPopup" class="fixed top-0 left-0 right-0 telegram-popup py-3 px-5 flex items-center justify-between z-50" style="display: none;">
        <div class="flex items-center gap-3">
            <i class="fab fa-telegram text-2xl" style="color: #ff4d4d; animation: spin 3s linear infinite;"></i>
            <span class="font-bold text-white">🔥 @cybersorgu</span>
        </div>
        <a href="https://t.me/cybersorgu" target="_blank" class="btn-secondary text-xs py-2">KATIL</a>
    </div>

    <div id="security-layer" class="fixed inset-0 z-50 flex items-center justify-center" style="background: #0a0000;">
        <div class="glass-panel p-8 text-center max-w-sm w-11/12">
            <i class="fas fa-shield-alt text-5xl mb-4" style="color: #ff4d4d; animation: pulse 2s ease-in-out infinite;"></i>
            <h2 class="cyber-title text-3xl mb-2">CYBERSORGU</h2>
            <p class="mb-6 opacity-80 text-white">Güvenlik doğrulaması yapılıyor...</p>
            <button onclick="verifySecurity()" class="btn-primary ripple">DOĞRULAMAYI BAŞLAT</button>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden" style="background: rgba(0,0,0,0.95); backdrop-filter: blur(5px);">
        <div class="glass-panel p-8 max-w-md w-11/12">
            <div class="text-center mb-6">
                <i class="fas fa-skull text-5xl mb-3" style="color: #ff4d4d; animation: pulse 2s ease-in-out infinite;"></i>
                <h2 class="cyber-title text-3xl">CYBERSORGU</h2>
                <p class="text-red-300 mt-2">Giriş Yap veya Kayıt Ol</p>
            </div>
            
            <div class="flex gap-2 mb-6">
                <button onclick="switchAuthTab('login')" id="login-tab" class="flex-1 py-3 rounded-xl font-bold transition-all duration-300" style="background: #8b0000; color: white;">GİRİŞ</button>
                <button onclick="switchAuthTab('register')" id="register-tab" class="flex-1 py-3 rounded-xl font-bold transition-all duration-300" style="background: rgba(139,0,0,0.3); color: #ff9999;">KAYIT</button>
            </div>
            
            <div id="login-form">
                <div class="mb-4">
                    <input type="text" id="login-username" placeholder="Kullanıcı Adı" class="input-blood">
                </div>
                <div class="mb-4">
                    <input type="password" id="login-password" placeholder="Şifre" class="input-blood">
                </div>
                <button onclick="handleLogin()" class="btn-primary ripple mb-3">GİRİŞ YAP</button>
            </div>
            
            <div id="register-form" style="display: none;">
                <div class="mb-4">
                    <input type="text" id="reg-username" placeholder="Kullanıcı Adı" class="input-blood">
                </div>
                <div class="mb-4">
                    <input type="password" id="reg-password" placeholder="Şifre" class="input-blood">
                </div>
                <div class="mb-4">
                    <input type="password" id="reg-password2" placeholder="Şifre Tekrar" class="input-blood">
                </div>
                <button onclick="handleRegister()" class="btn-primary ripple">KAYIT OL</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden h-full flex flex-col">
        <nav class="glass-panel px-4 py-3 flex justify-between items-center mx-3 mt-2">
            <button onclick="toggleMenu()" class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:bg-red-900" style="background: rgba(139,0,0,0.3);">
                <i class="fas fa-bars text-xl" style="color: #ff4d4d;"></i>
            </button>
            <span class="cyber-title text-2xl">CYBERSORGU</span>
            <div class="flex items-center gap-2">
                <span id="user-badge" class="text-sm hidden px-3 py-1 rounded-full transition-all duration-300 hover:scale-105" style="background: #8b0000; color: white;"></span>
                <button onclick="logout()" class="w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:bg-red-900" style="background: rgba(139,0,0,0.3);">
                    <i class="fas fa-sign-out-alt text-xl" style="color: #ff4d4d;"></i>
                </button>
            </div>
        </nav>

        <div id="announcement-container" class="mx-3 mt-2"></div>

        <div id="sidebar" class="fixed top-0 left-0 h-full w-72 glass-panel z-40 transform -translate-x-full transition-transform duration-500 p-5 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-lg" style="color: #ff4d4d;">⚔️ SORGULAR</span>
                <button onclick="toggleMenu()" class="w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:bg-red-900" style="background: rgba(139,0,0,0.3);">
                    <i class="fas fa-times" style="color: #ff4d4d;"></i>
                </button>
            </div>
            <div id="menu-items" class="space-y-2"></div>
            
            <div id="admin-menu-section" class="mt-6 pt-4 border-t border-red-900 hidden">
                <span class="font-bold text-lg mb-3 block" style="color: #ffd700;">👑 ADMIN PANELİ</span>
                <button onclick="showAdminPanel()" class="menu-item">
                    <i class="fas fa-crown mr-2"></i> Admin Paneli
                </button>
                <button onclick="showAnnouncements()" class="menu-item">
                    <i class="fas fa-bullhorn mr-2"></i> Duyuru Yönetimi
                </button>
                <button onclick="showStats()" class="menu-item">
                    <i class="fas fa-chart-line mr-2"></i> İstatistikler
                </button>
                <button onclick="showUsers()" class="menu-item">
                    <i class="fas fa-users mr-2"></i> Kullanıcılar
                </button>
            </div>
        </div>

        <main class="flex-1 overflow-y-auto p-4">
            <div id="query-section" class="glass-panel p-5 mb-4">
                <h1 id="service-title" class="text-center font-bold text-xl mb-1" style="color: #ffb3b3;">TC Sorgu</h1>
                <p id="service-desc" class="text-center text-sm opacity-70 mb-4">TC Kimlik Numarası Girin</p>
                
                <div id="input-container">
                    <input type="text" id="input-tc" placeholder="TC KİMLİK NO GİRİN" class="input-blood mb-3">
                    <button onclick="runQuery()" class="btn-primary ripple">
                        <i class="fas fa-search mr-2"></i>SORGULAMAYI BAŞLAT
                    </button>
                </div>
            </div>

            <div id="result-container" style="display: none;">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-bold flex items-center gap-2" style="color: #ffb3b3;">
                        <i class="fas fa-skull" style="color: #ff4d4d; animation: pulse 2s ease-in-out infinite;"></i> SONUÇ
                    </h3>
                    <div class="flex gap-2">
                        <button onclick="copyResult()" class="btn-secondary ripple"><i class="fas fa-copy mr-1"></i>KOPYALA</button>
                        <button onclick="downloadResult()" class="btn-secondary ripple"><i class="fas fa-download mr-1"></i>İNDİR</button>
                    </div>
                </div>
                <div id="output-box"></div>
            </div>

            <div id="admin-panel" style="display: none;">
                <div class="glass-panel p-6">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2" style="color: #ffd700;">
                        <i class="fas fa-crown"></i> ADMIN PANELİ
                    </h2>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="stats-card">
                            <i class="fas fa-users text-3xl mb-2" style="color: #ff4d4d;"></i>
                            <div class="text-2xl font-bold" id="stats-users">0</div>
                            <div class="text-sm opacity-70">Kullanıcı</div>
                        </div>
                        <div class="stats-card">
                            <i class="fas fa-search text-3xl mb-2" style="color: #ff4d4d;"></i>
                            <div class="text-2xl font-bold" id="stats-queries">0</div>
                            <div class="text-sm opacity-70">Sorgu</div>
                        </div>
                        <div class="stats-card">
                            <i class="fas fa-clock text-3xl mb-2" style="color: #ff4d4d;"></i>
                            <div class="text-2xl font-bold" id="stats-online">0</div>
                            <div class="text-sm opacity-70">Online</div>
                        </div>
                        <div class="stats-card">
                            <i class="fas fa-bullhorn text-3xl mb-2" style="color: #ff4d4d;"></i>
                            <div class="text-2xl font-bold" id="stats-announcements">0</div>
                            <div class="text-sm opacity-70">Duyuru</div>
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <canvas id="statsChart"></canvas>
                    </div>
                    
                    <div class="mb-6">
                        <h3 class="text-xl font-bold mb-4" style="color: #ffb3b3;">📢 Duyuru Yönetimi</h3>
                        <div class="mb-4">
                            <textarea id="announcement-text" class="input-blood" rows="3" placeholder="Duyuru metni..."></textarea>
                        </div>
                        <div class="flex gap-2 mb-4">
                            <button onclick="addAnnouncement()" class="btn-primary flex-1 ripple">DUYURU EKLE</button>
                            <button onclick="clearAnnouncements()" class="btn-danger flex-1 ripple">TEMİZLE</button>
                        </div>
                        <div id="announcement-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                    
                    <div>
                        <h3 class="text-xl font-bold mb-4" style="color: #ffb3b3;">👥 Kullanıcı Listesi</h3>
                        <div id="user-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
